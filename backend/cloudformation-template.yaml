AWSTemplateFormatVersion: '2010-09-09'
Description: Mattar serverless backend — API Gateway, Lambda, DynamoDB, Cognito

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
  AllowedOrigins:
    Type: String
    Default: http://localhost:5173
  OAuthRedirectUri:
    Type: String
    Default: http://localhost:5173/auth/callback
  LogoutRedirectUri:
    Type: String
    Default: http://localhost:5173/login
  LambdaCodeS3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment package
  LambdaCodeS3Key:
    Type: String
    Default: mattar-api/lambda.zip
  GoogleClientId:
    Type: String
    Default: ''
    NoEcho: true
  GoogleClientSecret:
    Type: String
    Default: ''
    NoEcho: true
  SlackClientId:
    Type: String
    Default: ''
    NoEcho: true
  SlackClientSecret:
    Type: String
    Default: ''
    NoEcho: true
  SlackSigningSecret:
    Type: String
    Default: ''
    NoEcho: true

Resources:
  MattarTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub mattar-${EnvironmentName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub mattar-users-${EnvironmentName}
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Schema:
        - Name: email
          Required: true
          Mutable: true

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub mattar-${EnvironmentName}-${AWS::AccountId}
      UserPoolId: !Ref CognitoUserPool

  CognitoGoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: HasGoogleCredentials
    Properties:
      ProviderName: Google
      ProviderType: Google
      UserPoolId: !Ref CognitoUserPool
      AttributeMapping:
        email: email
        name: name
        given_name: given_name
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: openid email profile

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn:
      - CognitoGoogleIdentityProvider
    Properties:
      ClientName: !Sub mattar-web-${EnvironmentName}
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - !Ref OAuthRedirectUri
      LogoutURLs:
        - !Ref LogoutRedirectUri
      SupportedIdentityProviders:
        !If
          - HasGoogleCredentials
          - - Google
          - - COGNITO
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH

  ApiHandlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub mattar-api-handler-${EnvironmentName}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:DeleteItem
                Resource:
                  - !GetAtt MattarTable.Arn
                  - !Sub ${MattarTable.Arn}/index/*

  StreamProcessorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub mattar-stream-processor-${EnvironmentName}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: StreamAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:DescribeStream
                  - dynamodb:ListStreams
                Resource: !GetAtt MattarTable.StreamArn

  ApiHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub mattar-api-${EnvironmentName}
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt ApiHandlerRole.Arn
      Timeout: 29
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          MATTAR_TABLE_NAME: !Ref MattarTable
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
          COGNITO_REGION: !Ref AWS::Region
          COGNITO_DOMAIN: !Sub mattar-${EnvironmentName}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com
          OAUTH_REDIRECT_URI: !Ref OAuthRedirectUri
          ALLOWED_ORIGINS: !Ref AllowedOrigins
          ALLOWED_WORKSPACE_DOMAIN: york.ie
          ALLOWED_WORKSPACE_NAME: York
          API_BASE_URL: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
          GOOGLE_OAUTH_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_OAUTH_CLIENT_SECRET: !Ref GoogleClientSecret
          GMAIL_OAUTH_REDIRECT_URI: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/api/v1/oauth/gmail/callback
          SLACK_CLIENT_ID: !Ref SlackClientId
          SLACK_CLIENT_SECRET: !Ref SlackClientSecret
          SLACK_SIGNING_SECRET: !Ref SlackSigningSecret
          SLACK_OAUTH_REDIRECT_URI: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/api/v1/oauth/slack/callback

  StreamProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub mattar-stream-${EnvironmentName}
      Runtime: nodejs20.x
      Handler: stream.handler
      Role: !GetAtt StreamProcessorRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          MATTAR_TABLE_NAME: !Ref MattarTable

  StreamEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt MattarTable.StreamArn
      FunctionName: !Ref StreamProcessorFunction
      StartingPosition: LATEST
      BatchSize: 10

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub mattar-api-${EnvironmentName}
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiHandlerFunction.Arn}/invocations
      PayloadFormatVersion: '2.0'

  ApiRouteProxy:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: ANY /{proxy+}
      Target: !Sub integrations/${ApiIntegration}

  ApiRouteRoot:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: ANY /
      Target: !Sub integrations/${ApiIntegration}

  ApiHandlerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ApiHandlerFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*

Conditions:
  HasGoogleCredentials: !And
    - !Not [!Equals [!Ref GoogleClientId, '']]
    - !Not [!Equals [!Ref GoogleClientSecret, '']]

Outputs:
  ApiBaseUrl:
    Description: API Gateway HTTP API base URL
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
  CognitoUserPoolId:
    Value: !Ref CognitoUserPool
  CognitoClientId:
    Value: !Ref CognitoUserPoolClient
  CognitoRegion:
    Value: !Ref AWS::Region
  CognitoDomain:
    Value: !Sub mattar-${EnvironmentName}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com
  MattarTableName:
    Value: !Ref MattarTable
