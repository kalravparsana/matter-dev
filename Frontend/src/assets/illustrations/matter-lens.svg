<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" fill="none" role="img">
  <title>Matter agent lens</title>
  <defs>
    <linearGradient id="ml-sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5FAF4"/>
      <stop offset="50%" stop-color="#EEFBF6"/>
      <stop offset="100%" stop-color="#F4F6F9"/>
    </linearGradient>
    <linearGradient id="ml-lens" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#00C997"/>
      <stop offset="50%" stop-color="#00B48A"/>
      <stop offset="100%" stop-color="#009670"/>
    </linearGradient>
    <linearGradient id="ml-thread" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8C2CE"/>
      <stop offset="50%" stop-color="#00C997"/>
      <stop offset="100%" stop-color="#E8A838"/>
    </linearGradient>
    <filter id="ml-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="noise" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
    </filter>
    <filter id="ml-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offset"/>
      <feFlood flood-color="#00B48A" flood-opacity="0.12"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="ml-beacon-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8A838" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8A838" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="200" fill="url(#ml-sky)" filter="url(#ml-grain)"/>
  <!-- Background atmosphere -->
  <ellipse cx="240" cy="100" rx="180" ry="70" fill="#00B48A" opacity="0.06"/>
  <!-- Converging thread strands (midground) -->
  <path d="M20 40 Q120 80 220 95" stroke="url(#ml-thread)" stroke-width="2" fill="none" opacity="0.55"/>
  <path d="M30 160 Q130 120 220 105" stroke="url(#ml-thread)" stroke-width="2" fill="none" opacity="0.55"/>
  <path d="M60 20 Q150 60 230 90" stroke="#00C997" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M40 180 Q140 140 230 110" stroke="#00C997" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M460 50 Q360 75 270 95" stroke="url(#ml-thread)" stroke-width="2" fill="none" opacity="0.45"/>
  <path d="M450 150 Q350 125 270 105" stroke="url(#ml-thread)" stroke-width="2" fill="none" opacity="0.45"/>
  <!-- Ground shadow -->
  <ellipse cx="270" cy="165" rx="50" ry="8" fill="#00B48A" opacity="0.1" filter="url(#ml-shadow)"/>
  <!-- Hexagonal lens (foreground focal) -->
  <g filter="url(#ml-shadow)" transform="translate(240, 100)">
    <polygon points="0,-45 39,-22.5 39,22.5 0,45 -39,22.5 -39,-22.5" fill="url(#ml-lens)" stroke="#00C997" stroke-width="1.5"/>
    <polygon points="0,-35 30,-17.5 30,17.5 0,35 -30,17.5 -30,-17.5" fill="none" stroke="#00C997" stroke-width="0.75" opacity="0.5"/>
    <!-- Inner aperture -->
    <circle cx="0" cy="0" r="18" fill="#00B48A" opacity="0.5"/>
    <circle cx="0" cy="0" r="12" fill="#009670" opacity="0.7"/>
    <!-- Beacon glow -->
    <circle cx="0" cy="0" r="20" fill="url(#ml-beacon-glow)"/>
    <circle cx="0" cy="0" r="6" fill="#E8A838"/>
    <circle cx="-2" cy="-2" r="2" fill="#F5C86A" opacity="0.9"/>
  </g>
  <!-- Highlight on lens top edge -->
  <path d="M220 58 L240 52 L260 58" stroke="#00C997" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
</svg>
